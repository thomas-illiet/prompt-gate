{{- if .Values.proxy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prompt-gate.fullname" . }}-proxy
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- if .Values.argoCd.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.workload | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.proxy.replicas }}
  selector:
    matchLabels:
      {{- include "prompt-gate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        {{- include "prompt-gate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: proxy
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.proxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.proxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "prompt-gate.serviceAccountName" . }}
      {{- include "prompt-gate.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "prompt-gate.podSecurityContext" . | nindent 8 }}
      containers:
        - name: proxy
          image: {{ include "prompt-gate.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/promptgate
            - proxy
          ports:
            - name: http
              containerPort: {{ .Values.config.proxyPort }}
              protocol: TCP
          {{- include "prompt-gate.envFrom" . | nindent 10 }}
          securityContext:
            {{- include "prompt-gate.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          {{- with .Values.proxy.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "prompt-gate.podPlacement" . | nindent 6 }}
{{- end }}
