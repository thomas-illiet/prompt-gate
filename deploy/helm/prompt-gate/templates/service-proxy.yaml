{{- if .Values.proxy.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prompt-gate.fullname" . }}-proxy
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- if .Values.argoCd.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.service | quote }}
  {{- end }}
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    - name: http
      port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "prompt-gate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
{{- end }}
