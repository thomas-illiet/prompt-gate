{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "prompt-gate.serviceAccountName" . }}
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
  {{- if or .Values.argoCd.enabled .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.argoCd.enabled }}
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.serviceAccount | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: false
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
