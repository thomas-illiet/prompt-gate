{{- if .Values.api.enabled -}}
{{- $adminApiKeyValue := include "prompt-gate.adminApiKeyValue" . -}}
{{- $adminApiKeyExistingSecretName := include "prompt-gate.adminApiKeyExistingSecretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prompt-gate.fullname" . }}-api
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if .Values.argoCd.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.workload | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "prompt-gate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "prompt-gate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and (ne $adminApiKeyValue "") (eq $adminApiKeyExistingSecretName "") }}
        checksum/admin-api-key: {{ include (print $.Template.BasePath "/secret-admin-api-key.yaml") . | sha256sum }}
        {{- else if ne $adminApiKeyExistingSecretName "" }}
        rollout/admin-api-key: {{ default "" .Values.adminApiKey.rolloutToken | toString | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "prompt-gate.serviceAccountName" . }}
      {{- include "prompt-gate.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "prompt-gate.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "prompt-gate.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/promptgate
            - api
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          {{- include "prompt-gate.envFrom" . | nindent 10 }}
          {{- if or (ne $adminApiKeyValue "") (ne $adminApiKeyExistingSecretName "") }}
          env:
            - name: PROMPTGATE_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "prompt-gate.adminApiKeySecretName" . | quote }}
                  key: {{ include "prompt-gate.adminApiKeySecretKey" . | quote }}
                  optional: false
          {{- end }}
          securityContext:
            {{- include "prompt-gate.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "prompt-gate.podPlacement" . | nindent 6 }}
{{- end }}
