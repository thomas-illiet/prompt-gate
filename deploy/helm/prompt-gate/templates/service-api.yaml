{{- if .Values.api.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prompt-gate.fullname" . }}-api
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if .Values.argoCd.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.service | quote }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "prompt-gate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
