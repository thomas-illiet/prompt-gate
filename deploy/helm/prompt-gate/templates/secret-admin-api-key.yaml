{{- include "prompt-gate.validateAdminApiKey" . -}}
{{- $adminApiKeyValue := include "prompt-gate.adminApiKeyValue" . -}}
{{- $adminApiKeyExistingSecretName := include "prompt-gate.adminApiKeyExistingSecretName" . -}}
{{- if and .Values.api.enabled (ne $adminApiKeyValue "") (eq $adminApiKeyExistingSecretName "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prompt-gate.adminApiKeySecretName" . }}
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
  {{- if or .Values.argoCd.enabled .Values.adminApiKey.annotations }}
  annotations:
    {{- if .Values.argoCd.enabled }}
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.config | quote }}
    {{- end }}
    {{- with .Values.adminApiKey.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
type: Opaque
data:
  PROMPTGATE_ADMIN_API_KEY: {{ $adminApiKeyValue | b64enc | quote }}
{{- end }}
