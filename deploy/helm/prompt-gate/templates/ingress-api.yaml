{{- if and .Values.ingress.enabled .Values.api.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "prompt-gate.fullname" . }}-api
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if or .Values.argoCd.enabled .Values.ingress.api.annotations }}
  annotations:
    {{- if .Values.argoCd.enabled }}
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.ingress | quote }}
    {{- end }}
    {{- with .Values.ingress.api.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "prompt-gate.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
