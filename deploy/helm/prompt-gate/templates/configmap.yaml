apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prompt-gate.fullname" . }}
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
  {{- if .Values.argoCd.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.config | quote }}
  {{- end }}
data:
  PROMPTGATE_PORT: {{ .Values.config.port | quote }}
  PROMPTGATE_PROXY_PORT: {{ .Values.config.proxyPort | quote }}
  PROMPTGATE_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PROMPTGATE_KEYCLOAK_ISSUER_URL: {{ .Values.config.keycloakIssuerUrl | quote }}
  PROMPTGATE_KEYCLOAK_JWKS_URL: {{ .Values.config.keycloakJwksUrl | quote }}
  PROMPTGATE_KEYCLOAK_CLIENT_ID: {{ .Values.config.keycloakClientId | quote }}
  PROMPTGATE_CA_FILE: {{ .Values.config.caFile | quote }}
  PROMPTGATE_FRONTEND_BASE_URL: {{ include "prompt-gate.frontendBaseUrl" . | quote }}
  PROMPTGATE_BACKEND_BASE_URL: {{ include "prompt-gate.backendBaseUrl" . | quote }}
  PROMPTGATE_PROXY_BASE_URL: {{ include "prompt-gate.proxyBaseUrl" . | quote }}
  PROMPTGATE_STATIC_ASSETS_DIR: {{ .Values.config.staticAssetsDir | quote }}
  PROMPTGATE_SESSION_COOKIE_NAME: {{ .Values.config.sessionCookieName | quote }}
  PROMPTGATE_SESSION_TTL: {{ .Values.config.sessionTtl | quote }}
  PROMPTGATE_CORS_ALLOWED_ORIGINS: {{ default (include "prompt-gate.frontendBaseUrl" .) .Values.config.corsAllowedOrigins | quote }}
  PROMPTGATE_TOKEN_CLEANUP_INTERVAL: {{ .Values.config.tokenCleanupInterval | quote }}
  PROMPTGATE_USER_ACCESS_EXPIRATION_INTERVAL: {{ .Values.config.userAccessExpirationInterval | quote }}
  PROMPTGATE_PROXY_TRUST_FORWARD_HEADERS: {{ .Values.config.proxyTrustForwardHeaders | quote }}
  PROMPTGATE_REDIS_CACHE_TTL: {{ .Values.config.redisCacheTtl | quote }}
  PROMPTGATE_PROXY_RELOAD_DEBOUNCE: {{ .Values.config.proxyReloadDebounce | quote }}
  PROMPTGATE_PROXY_MAX_BUFFERED_REQUEST_BYTES: {{ .Values.config.proxyMaxBufferedRequestBytes | quote }}
  PROMPTGATE_PROXY_MAX_BUFFERED_RESPONSE_BYTES: {{ .Values.config.proxyMaxBufferedResponseBytes | quote }}
  PROMPTGATE_PROXY_UPSTREAM_TIMEOUT: {{ .Values.config.proxyUpstreamTimeout | quote }}
  PROMPTGATE_WORKER_BATCH_SIZE: {{ .Values.config.workerBatchSize | quote }}
  PROMPTGATE_WORKER_BLOCK_TIMEOUT: {{ .Values.config.workerBlockTimeout | quote }}
  PROMPTGATE_WORKER_PENDING_IDLE_TIMEOUT: {{ .Values.config.workerPendingIdleTimeout | quote }}
  PROMPTGATE_USAGE_RAW_RETENTION: {{ .Values.config.usageRawRetention | quote }}
  PROMPTGATE_USAGE_RAW_CLEANUP_INTERVAL: {{ .Values.config.usageRawCleanupInterval | quote }}
  PROMPTGATE_SUBSCRIPTION_QUOTA_SYNC_INTERVAL: {{ .Values.config.subscriptionQuotaSyncInterval | quote }}
  PROMPTGATE_USAGE_COST_ENABLED: {{ .Values.config.usageCostEnabled | quote }}
  PROMPTGATE_USAGE_COST_INPUT: {{ .Values.config.usageCostInput | quote }}
  PROMPTGATE_USAGE_COST_OUTPUT: {{ .Values.config.usageCostOutput | quote }}
  PROMPTGATE_USAGE_COST_EMBEDDING: {{ .Values.config.usageCostEmbedding | quote }}
