{{- if not .Values.secret.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prompt-gate.secretName" . }}
  labels:
    {{- include "prompt-gate.labels" . | nindent 4 }}
  {{- if or .Values.argoCd.enabled .Values.secret.annotations }}
  annotations:
    {{- if .Values.argoCd.enabled }}
    argocd.argoproj.io/sync-wave: {{ .Values.argoCd.syncWaves.config | quote }}
    {{- end }}
    {{- with .Values.secret.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
type: Opaque
data:
  PROMPTGATE_DATABASE_URL: {{ default "" .Values.secret.databaseUrl | toString | b64enc | quote }}
  PROMPTGATE_REDIS_URL: {{ default "" .Values.secret.redisUrl | toString | b64enc | quote }}
  PROMPTGATE_JWT_SECRET: {{ default "" .Values.secret.jwtSecret | toString | b64enc | quote }}
  PROMPTGATE_SECRETS_KEY: {{ default "" .Values.secret.secretsKey | toString | b64enc | quote }}
  PROMPTGATE_KEYCLOAK_CLIENT_SECRET: {{ default "" .Values.secret.keycloakClientSecret | toString | b64enc | quote }}
{{- end }}
