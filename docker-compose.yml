name: promptgate

x-promptgate-image: &promptgate-image
  image: promptgate-backend:local
  build:
    context: .
    dockerfile: Dockerfile

x-promptgate-environment: &promptgate-environment
  PROMPTGATE_LOG_LEVEL: debug
  PROMPTGATE_DATABASE_URL: postgres://postgres:postgres@postgres:5432/promptgate?sslmode=disable
  PROMPTGATE_REDIS_URL: redis://redis:6379/0
  PROMPTGATE_JWT_SECRET: 217aa2149850505496da13b3e4c68b26b2f963aae6b0c7992c828b2b6d2a4462
  PROMPTGATE_SECRETS_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  PROMPTGATE_KEYCLOAK_ISSUER_URL: http://keycloak.localhost:8082/realms/promptgate
  PROMPTGATE_KEYCLOAK_JWKS_URL: http://keycloak.localhost:8082/realms/promptgate/protocol/openid-connect/certs
  PROMPTGATE_KEYCLOAK_CLIENT_ID: promptgate-backend
  PROMPTGATE_KEYCLOAK_CLIENT_SECRET: ""
  PROMPTGATE_CA_FILE: ""
  PROMPTGATE_FRONTEND_BASE_URL: http://localhost:8080
  PROMPTGATE_BACKEND_BASE_URL: http://localhost:8080
  PROMPTGATE_PROXY_BASE_URL: http://localhost:8081
  PROMPTGATE_CORS_ALLOWED_ORIGINS: http://localhost:8080
  PROMPTGATE_SESSION_COOKIE_NAME: promptgate_session
  PROMPTGATE_SESSION_TTL: 8h
  PROMPTGATE_TOKEN_CLEANUP_INTERVAL: 1h
  PROMPTGATE_USER_ACCESS_EXPIRATION_INTERVAL: 1h
  PROMPTGATE_PROXY_TRUST_FORWARD_HEADERS: "false"
  PROMPTGATE_REDIS_CACHE_TTL: 5m
  PROMPTGATE_PROXY_RELOAD_DEBOUNCE: 250ms
  PROMPTGATE_WORKER_BATCH_SIZE: 100
  PROMPTGATE_WORKER_BLOCK_TIMEOUT: 5s
  PROMPTGATE_WORKER_PENDING_IDLE_TIMEOUT: 30s
  PROMPTGATE_USAGE_RAW_RETENTION: 2160h
  PROMPTGATE_USAGE_RAW_CLEANUP_INTERVAL: 1h
  PROMPTGATE_SUBSCRIPTION_QUOTA_SYNC_INTERVAL: 5m

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: promptgate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command:
      - start-dev
      - --import-realm
      - --hostname=http://keycloak.localhost:8082
      - --hostname-backchannel-dynamic=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8082:8080"
    volumes:
      - ./deploy/keycloak/promptgate-realm.json:/opt/keycloak/data/import/promptgate-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep '200'; } 0<>/dev/tcp/localhost/9000",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  migrate:
    <<: *promptgate-image
    command: ["/app/promptgate", "migrate"]
    environment:
      <<: *promptgate-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    image: postgres:18-alpine
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - |
        psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d promptgate <<'SQL'
        INSERT INTO providers (
          id,
          name,
          display_name,
          type,
          base_url,
          api_key_ciphertext,
          config,
          enabled,
          created_at,
          updated_at,
          deleted_at
        )
        VALUES (
          '00000000-0000-0000-0000-000000000001',
          'ollama',
          'Local Ollama',
          'ollama',
          'http://host.docker.internal:11434/v1',
          '',
          '{}'::jsonb,
          true,
          NOW(),
          NOW(),
          NULL
        )
        ON CONFLICT (name) DO NOTHING;
        SQL
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  seed-cache:
    image: redis:8-alpine
    command:
      [
        "redis-cli",
        "-u",
        "redis://redis:6379/0",
        "DEL",
        "promptgate:config:snapshot:providers",
      ]
    depends_on:
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *promptgate-image
    command: ["/app/promptgate", "api"]
    environment:
      <<: *promptgate-environment
      PROMPTGATE_PORT: 8080
    ports:
      - "8080:8080"
    extra_hosts:
      - "keycloak.localhost:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  proxy:
    <<: *promptgate-image
    command: ["/app/promptgate", "proxy"]
    environment:
      <<: *promptgate-environment
      PROMPTGATE_PROXY_PORT: 8081
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      seed-cache:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    <<: *promptgate-image
    command: ["/app/promptgate", "worker"]
    environment:
      <<: *promptgate-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  schedule:
    <<: *promptgate-image
    command: ["/app/promptgate", "schedule"]
    environment:
      <<: *promptgate-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
