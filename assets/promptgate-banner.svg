<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Gate</title>
  <desc id="desc">A dark banner showing Prompt Gate as a controlled gateway between applications and LLM providers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <path d="M0 280 C180 228 272 340 440 288 C610 236 724 120 922 162 C1080 196 1162 114 1280 74 L1280 360 L0 360 Z" fill="#0f766e" opacity="0.16"/>
  <path d="M0 72 C174 132 302 18 482 74 C632 121 768 197 932 133 C1054 86 1178 98 1280 140" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.22"/>
  <path d="M0 104 C194 167 335 69 498 116 C664 164 750 270 940 210 C1088 163 1180 184 1280 234" fill="none" stroke="#34d399" stroke-width="2" opacity="0.18"/>

  <g transform="translate(86 70)">
    <text x="0" y="46" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="2.5" fill="#67e8f9">PROMPT GATE</text>
    <text x="0" y="115" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Secure LLM access</text>
    <text x="0" y="168" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="600" fill="#cbd5e1">for teams, providers, tools, and tokens</text>
    <text x="0" y="222" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#94a3b8">OIDC control plane | API token proxy | firewall rules | usage history | MCP routing</text>
  </g>

  <g transform="translate(722 52)" filter="url(#softShadow)">
    <rect x="108" y="38" width="196" height="196" rx="26" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="135" y="72" width="142" height="128" rx="18" fill="#020617" stroke="url(#gate)" stroke-width="4"/>
    <path d="M206 92 L206 180" stroke="url(#gate)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="206" cy="136" r="12" fill="#34d399"/>

    <g stroke-linecap="round" stroke-width="4" fill="none">
      <path d="M0 86 L102 136" stroke="#38bdf8"/>
      <path d="M0 186 L102 136" stroke="#34d399"/>
      <path d="M310 136 L414 86" stroke="#38bdf8"/>
      <path d="M310 136 L414 186" stroke="#34d399"/>
    </g>

    <g fill="#0f172a" stroke="#475569" stroke-width="2">
      <rect x="-8" y="58" width="86" height="56" rx="14"/>
      <rect x="-8" y="158" width="86" height="56" rx="14"/>
      <rect x="386" y="58" width="86" height="56" rx="14"/>
      <rect x="386" y="158" width="86" height="56" rx="14"/>
    </g>
    <g fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
      <text x="35" y="92">apps</text>
      <text x="35" y="192">users</text>
      <text x="429" y="92">LLMs</text>
      <text x="429" y="192">MCP</text>
    </g>
  </g>
</svg>
